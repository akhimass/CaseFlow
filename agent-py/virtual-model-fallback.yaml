name: caseflow-virtual-models
type: provider-account/virtual-model
integrations:
  - name: caseflow-primary
    type: integration/model/virtual
    slug: caseflow-primary
    model_types:
      - chat
    routing_config:
      type: priority-based-routing
      load_balance_targets:
        - target: openai/gpt-4o-mini      # Primary — OpenAI via TrueFoundry
          priority: 0
          retry_config:
            attempts: 3
            delay: 200
            on_status_codes:
              - "429"
              - "500"
              - "503"
          fallback_status_codes:
            - "429"
            - "500"
            - "502"
            - "503"
        - target: aws-bedrock/deepseek.v3-v1-0    # Fallback — Bedrock
          priority: 1
          retry_config:
            attempts: 2
            delay: 100
          fallback_status_codes:
            - "429"
            - "500"
            - "502"
            - "503"
