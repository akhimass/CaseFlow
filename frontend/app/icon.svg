<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <rect width="64" height="64" rx="14" fill="#0a0a0a" />
  <!-- Scaled up so the mark reads larger in the browser tab slot -->
  <g transform="translate(32 32) scale(1.18) translate(-32 -32)" stroke="#ffffff" fill="none">
    <!-- Folder -->
    <path
      d="M10 22.5V44.5C10 46.4 11.6 48 13.5 48H50.5C52.4 48 54 46.4 54 44.5V26.5C54 24.6 52.4 23 50.5 23H38.5L34.5 19H13.5C11.6 19 10 20.6 10 22.5Z"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Flowy current the camera sits in -->
    <path
      d="M12 27 C18 24, 24 24, 30 27 S42 30, 50 27"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Camera body -->
    <rect x="22" y="31" width="20" height="13" rx="2.5" stroke-width="2.5" />
    <!-- Lens -->
    <circle cx="32" cy="37.5" r="4.25" stroke-width="2.5" />
    <circle cx="32" cy="37.5" r="1.75" fill="#ffffff" stroke="none" />
    <!-- Viewfinder -->
    <path
      d="M27 31V28.5C27 27.7 27.7 27 28.5 27H35.5C36.3 27 37 27.7 37 28.5V31"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Flash dot -->
    <circle cx="39" cy="33.5" r="1.25" fill="#ffffff" stroke="none" />
  </g>
</svg>
